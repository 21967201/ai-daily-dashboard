name: Daily AI Report Update

on:
  schedule:
    # 北京时间每天08:00运行 (UTC+8 = UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: npm init -y && npm install axios

      - name: Fetch AI Daily Report and Generate HTML
        env:
          AIHOT_API: 'https://aihot.virxact.com/api/public/daily'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/generate-html.js

      - name: Commit and Push changes
        run: |
          git config user.name "GitHub Actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-daily-dashboard.html || true
          git diff --cached --quiet && echo "ℹ️ 无更新" && exit 0
          git commit -m "🤖 每日自动更新 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
          git push origin main
          echo "✅ 推送完成"
