        // 格式化时间为人话
        function formatTime(isoString) {
            if (!isoString) return '今天';
            
            const now = new Date();
            const beijingNow = new Date(now.getTime() + (8 * 60 * 60 * 1000));
            const date = new Date(isoString);
            const beijingDate = new Date(date.getTime() + (8 * 60 * 60 * 1000));
            
            const diffMs = beijingNow - beijingDate;
            const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            
            if (diffHours < 1) {
                const diffMinutes = Math.floor(diffMs / (1000 * 60));
                return diffMinutes < 1 ? '刚刚' : `${diffMinutes} 分钟前`;
            } else if (diffHours < 24) {
                return `${diffHours} 小时前`;
            } else if (diffDays === 1) {
                return `昨天 ${beijingDate.getHours().toString().padStart(2, '0')}:${beijingDate.getMinutes().toString().padStart(2, '0')}`;
            } else {
                return `${beijingDate.getMonth() + 1}/${beijingDate.getDate()} ${beijingDate.getHours().toString().padStart(2, '0')}:${beijingDate.getMinutes().toString().padStart(2, '0')}`;
            }
        }
