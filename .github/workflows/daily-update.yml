name: Daily AI Report Update

on:
  schedule:
    # 北京时间每天08:00运行 (UTC+8 = UTC 00:00)
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Fetch multi-source data and generate HTML
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd scripts && node generate-html.js

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-daily-dashboard.html || true
          git diff --cached --quiet && echo "ℹ️ 无更新" && exit 0
          git commit -m "🤖 每日自动更新 $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
          git push origin main
          echo "✅ 推送完成"
