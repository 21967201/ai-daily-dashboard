name: Daily AI Report Update

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: cd scripts && npm install

      - env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: cd scripts && node generate-html.js

      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ai-daily-dashboard.html || true
          git diff --cached --quiet && echo "无更新" && exit 0
          git commit -m "每2小时自动更新"
          git push origin main

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=ai-daily-dashboard --branch=main
